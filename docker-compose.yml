services:
  monerod:
    image: sethsimmons/simple-monerod:latest
    container_name: monero-node
    profiles: ["full-node"]
    restart: unless-stopped
    ports:
      - "38081:38081" # P2P
      - "127.0.0.1:38089:38089" # RPC
    volumes:
      - ./data/monerod:/home/monero/.bitmonero
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ "${MONERO_NETWORK:-stagenet}" = "mainnet" ]; then
          NETFLAG="";
        else
          NETFLAG="--${MONERO_NETWORK:-stagenet}";
        fi;
        exec monerod $$NETFLAG \
          --rpc-bind-ip=0.0.0.0 \
          --rpc-bind-port=38089 \
          --confirm-external-bind \
          --restricted-rpc \
          --bootstrap-daemon-address=${MONERO_BOOTSTRAP_ADDRESS:-rpc-${MONERO_NETWORK:-stagenet}.kyc.rip:443} \
          --log-level=0

  wallet-rpc:
    image: sethsimmons/simple-monero-wallet-rpc:latest
    container_name: monero-wallet-rpc
    restart: unless-stopped
    ports:
      - "127.0.0.1:38083:38083" # Localhost only Wallet RPC
    volumes:
      - ./data/wallet:/home/monero
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ "${MONERO_NETWORK:-stagenet}" = "mainnet" ]; then
          NETFLAG="";
        else
          NETFLAG="--${MONERO_NETWORK:-stagenet}";
        fi;
        exec monero-wallet-rpc $$NETFLAG \
          --rpc-bind-ip=0.0.0.0 \
          --confirm-external-bind \
          --rpc-bind-port=38083 \
          --wallet-dir=/home/monero \
          --disable-rpc-login \
          --daemon-address=${MONERO_DAEMON_ADDRESS:-rpc-${MONERO_NETWORK:-stagenet}.kyc.rip:443} \
          --daemon-ssl=${MONERO_DAEMON_SSL:-enabled} \
          --daemon-ssl-allow-any-cert

  gateway:
    image: ghcr.io/kyc-rip/ripley-xmr-gateway:latest
    container_name: ripley-xmr-gateway
    restart: unless-stopped
    depends_on:
      - wallet-rpc
    ports:
      - "127.0.0.1:38084:38084"
    volumes:
      - ./data/gateway:/app/data
    environment:
      - WALLET_RPC_URL=http://wallet-rpc:38083/json_rpc
      - MONERO_NETWORK=${MONERO_NETWORK:-stagenet}
      - AGENT_API_KEY=${AGENT_API_KEY:-ripley_secure_key_123}
      - MAX_XMR_PER_REQUEST=${MAX_XMR_PER_REQUEST:-0.1}
      - MAX_XMR_PER_DAY=${MAX_XMR_PER_DAY:-0.5}
      - DATA_DIR=/app/data
      - GATEWAY_HOST=0.0.0.0

  tunnel:
    image: cloudflare/cloudflared
    container_name: monero-gateway-tunnel
    restart: unless-stopped
    command: tunnel run --no-autoupdate
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - gateway
